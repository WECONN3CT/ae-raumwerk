<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>AE Raumwerk | Wartungsarbeiten</title>
    <meta name="description" content="Unsere Webseite wird gerade überarbeitet. Wir sind bald wieder für Sie da.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            color: #1a1a2e;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(15, 14, 121, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(10, 9, 82, 0.03) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(2%, -2%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 280px;
            max-width: 80vw;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #0f0e79;
            margin: 0 auto 2rem;
            border-radius: 2px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f0e79;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.45s forwards;
        }

        .contact-info {
            display: inline-flex;
            flex-direction: column;
            gap: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .contact-info a {
            color: #0f0e79;
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s ease;
        }

        .contact-info a:hover {
            opacity: 0.7;
        }

        .contact-info svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Pulsing dots animation */
        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .dots span {
            width: 8px;
            height: 8px;
            background: #0f0e79;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .logo { width: 220px; margin-bottom: 2rem; }
            h1 { font-size: 1.25rem; }
            p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/68f24106e1c9c3044217ea94_logo2.png" alt="AE Raumwerk" class="logo">

        <div class="divider"></div>

        <h1>Unsere Webseite wird gerade überarbeitet</h1>

        <p>Wir arbeiten an einem neuen Auftritt für Sie.<br>In Kürze sind wir mit frischem Design zurück.</p>

        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="contact-info">
            <a href="tel:+49159 0630 7011">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
                </svg>
                0159 0630 7011
            </a>
            <a href="mailto:info@ae-raumwerk.de">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                </svg>
                info@ae-raumwerk.de
            </a>
        </div>
    </div>
</body>
</html>

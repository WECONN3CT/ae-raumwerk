<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>AE Raumwerk | Wartungsarbeiten</title>
    <meta name="description" content="Unsere Webseite wird gerade überarbeitet. Wir sind bald wieder für Sie da.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            color: #1a1a2e;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 0;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(15, 14, 121, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(10, 9, 82, 0.03) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgShift {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(2%, -2%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            width: 280px;
            max-width: 80vw;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #0f0e79;
            margin: 0 auto 2rem;
            border-radius: 2px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f0e79;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        p {
            font-size: 1.05rem;
            font-weight: 300;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.45s forwards;
        }

        .contact-info {
            display: inline-flex;
            flex-direction: column;
            gap: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.6s forwards;
        }

        .contact-info a {
            color: #0f0e79;
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s ease;
        }

        .contact-info a:hover {
            opacity: 0.7;
        }

        .contact-info svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Pulsing dots animation */
        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .dots span {
            width: 8px;
            height: 8px;
            background: #0f0e79;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Contact Form */
        .form-section {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.7s forwards;
        }

        .form-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f0e79;
            margin-bottom: 1.5rem;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            flex: 1;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.95rem;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
            color: #1a1a2e;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #0f0e79;
            box-shadow: 0 0 0 3px rgba(15, 14, 121, 0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #c0c4cc;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: #0f0e79;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            letter-spacing: 0.02em;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: #0a0952;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Status-Meldungen */
        .form-msg {
            display: none;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 1rem;
            animation: fadeUp 0.5s ease forwards;
        }

        .form-msg.success {
            display: block;
            background: #ecfdf5;
            border: 1.5px solid #10b981;
            color: #065f46;
        }

        .form-msg.error {
            display: block;
            background: #fef2f2;
            border: 1.5px solid #ef4444;
            color: #991b1b;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 480px) {
            .logo { width: 220px; margin-bottom: 2rem; }
            h1 { font-size: 1.25rem; }
            p { font-size: 0.95rem; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/68f24106e1c9c3044217ea94_logo2.png" alt="AE Raumwerk" class="logo">

        <div class="divider"></div>

        <h1>Unsere Webseite wird gerade überarbeitet</h1>

        <p>Wir arbeiten an einem neuen Auftritt für Sie.<br>In Kürze sind wir mit frischem Design zurück.</p>

        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="contact-info">
            <a href="tel:+4915906307011">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
                </svg>
                0159 0630 7011
            </a>
            <a href="mailto:info@ae-raumwerk.de">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                </svg>
                info@ae-raumwerk.de
            </a>
        </div>

        <!-- Kontaktformular -->
        <div class="form-section">
            <div class="form-msg" id="formMsg"></div>
            <h2>Anfrage senden</h2>
            <form class="contact-form" id="contactForm" action="https://formspree.io/f/mzdkboly" method="POST">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="Name" placeholder="Ihr Name" required>
                    </div>
                    <div class="form-group">
                        <label for="telefon">Telefon</label>
                        <input type="tel" id="telefon" name="Telefon" placeholder="Ihre Telefonnummer">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="E-Mail" placeholder="Ihre E-Mail-Adresse" required>
                </div>

                <div class="form-group">
                    <label for="leistung">Gewünschte Leistung</label>
                    <select id="leistung" name="Leistung">
                        <option value="" disabled selected>Bitte wählen...</option>
                        <option value="Malerarbeiten">Malerarbeiten</option>
                        <option value="Tapezierarbeiten">Tapezierarbeiten</option>
                        <option value="Trockenbau">Trockenbau</option>
                        <option value="Bodenbeläge">Bodenbeläge</option>
                        <option value="Sanierung">Sanierung</option>
                        <option value="Instandhaltung">Instandhaltung</option>
                        <option value="Sonstiges">Sonstiges</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nachricht">Nachricht</label>
                    <textarea id="nachricht" name="Nachricht" placeholder="Beschreiben Sie kurz Ihr Anliegen..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Anfrage absenden</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var form = this;
            var btn = form.querySelector('.submit-btn');
            var msg = document.getElementById('formMsg');
            var originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';
            msg.className = 'form-msg';

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            })
            .then(function(response) {
                if (response.ok) {
                    msg.textContent = 'Vielen Dank! Wir haben Ihre Anfrage erhalten und melden uns schnellstmöglich bei Ihnen.';
                    msg.className = 'form-msg success';
                    form.reset();
                } else {
                    msg.textContent = 'Leider konnte Ihre Anfrage nicht gesendet werden. Bitte versuchen Sie es erneut oder kontaktieren Sie uns telefonisch.';
                    msg.className = 'form-msg error';
                }
            })
            .catch(function() {
                msg.textContent = 'Leider konnte Ihre Anfrage nicht gesendet werden. Bitte versuchen Sie es erneut oder kontaktieren Sie uns telefonisch.';
                msg.className = 'form-msg error';
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = originalText;
                msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        });
    </script>
</body>
</html>
